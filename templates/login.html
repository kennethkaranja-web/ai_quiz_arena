<!DOCTYPE html>
<html>
<head>
    <title>Login - AI Quiz Arena</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f9f9f9; }
        h1 { margin-top: 50px; }
        .login-box {
            margin: 100px auto;
            width: 300px;
            padding: 20px;
            border: 1px solid #ccc;
            background: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #aaa;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <h1>AI Quiz Arena</h1>
    <div class="login-box">
        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Enter your name" required>
            <button type="submit">Start Quiz</button>
        </form>
    </div>
</body>
</html>
