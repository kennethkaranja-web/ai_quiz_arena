<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard - AI Quiz Arena</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f9f9f9; text-align: center; }
        h1 { margin-top: 30px; }
        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 60%;
            background: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        th, td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: center;
        }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #4CAF50;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Leaderboard</h1>
    <table>
        <tr>
            <th>Rank</th>
            <th>Player</th>
            <th>Score</th>
        </tr>
        {% for player, s in leaderboard %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ player }}</td>
            <td>{{ s }}</td>
        </tr>
        {% endfor %}
    </table>
    <a href="/quiz">Back to Quiz</a>
<script>
    // Refresh leaderboard every 10 seconds
    setTimeout(function(){
        window.location.reload();
    }, 10000); // 10000 ms = 10 seconds
</script>
</body>
</html>
