<!DOCTYPE html>
<html>
<head>
    <title>AI Quiz Arena</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f9f9f9; }
        h1 { text-align: center; }
        .question-box {
            margin: 20px auto;
            padding: 15px;
            border: 1px solid #ccc;
            background: #fff;
            width: 80%;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        .question-box h3 { margin-bottom: 10px; }
        label {
            display: block;
            margin: 5px 0;
        }
        button {
            display: block;
            margin: 30px auto;
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #45a049; }
    </style>
</head>
<body>
    <h1>AI Quiz Arena</h1>
    <form method="POST" action="/submit">
        {% for q in questions %}
        <div class="question-box">
            <h3>Q{{ q.id }}: {{ q.question }}</h3>
            {% for option in q.options %}
                <label>
                    <input type="radio" name="q{{ q.id }}" value="{{ option[0] }}" required>
                    {{ option }}
                </label>
            {% endfor %}
        </div>
        {% endfor %}
        <button type="submit">Submit Quiz</button>
    </form>
</body>
</html>
